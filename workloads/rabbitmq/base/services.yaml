---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-management
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/component: management
spec:
  type: ClusterIP
  ports:
    - name: http-management
      port: 15672
      targetPort: 15672
      protocol: TCP
    - name: prometheus
      port: 15692
      targetPort: 15692
      protocol: TCP
  selector:
    app.kubernetes.io/name: rabbitmq
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-amqp
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/component: amqp
spec:
  type: ClusterIP
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      protocol: TCP
    - name: amqp-tls
      port: 5671
      targetPort: 5671
      protocol: TCP
  selector:
    app.kubernetes.io/name: rabbitmq
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rabbitmq-management-ingress
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/component: ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
    - hosts:
        - rabbitmq.example.com
      secretName: rabbitmq-ingress-tls
  rules:
    - host: rabbitmq.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rabbitmq-management
                port:
                  number: 15672
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rabbitmq-network-policy
  labels:
    app.kubernetes.io/name: rabbitmq
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/component: network-policy
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: rabbitmq
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app.kubernetes.io/part-of: rabbitmq
    - namespaceSelector:
        matchLabels:
          name: staging
    - namespaceSelector:
        matchLabels:
          name: production
    ports:
    - protocol: TCP
      port: 5672
    - protocol: TCP
      port: 5671
    - protocol: TCP
      port: 15672
    - protocol: TCP
      port: 15692
    - protocol: TCP
      port: 25672
  egress:
  - {}  # Allow all outbound traffic