apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: rabbitmq-cluster

resources:
  - rabbitmq-operator.yaml
  - rabbitmq-cluster.yaml
  - rabbitmq-secret.yaml
  - services.yaml
  - rabbitmq-pdb.yaml
  - serviceMonitor.yaml

labels:
  - pairs:
      app.kubernetes.io/part-of: rabbitmq
      app.kubernetes.io/version: "4.0"

namePrefix: ""

namespace: ""