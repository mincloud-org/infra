apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

namespace: staging

namePrefix: staging-

commonLabels:
  environment: staging

patches:
  - path: rabbitmq-cluster-patch.yaml
  - path: rabbitmq-secret-patch.yaml

replicas:
  - name: rabbitmq
    count: 3

images:
  - name: rabbitmq
    newTag: 4-management