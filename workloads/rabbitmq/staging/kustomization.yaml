apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../base

namespace: staging

namePrefix: staging-

labels:
  - pairs:
      environment: staging

patches:
  - path: rabbitmq-cluster-patch.yaml
  - path: rabbitmq-secret-patch.yaml

images:
  - name: rabbitmq
    newTag: 4-management