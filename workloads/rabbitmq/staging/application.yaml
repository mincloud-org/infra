apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rabbitmq-staging
  namespace: argocd
  labels:
    app.kubernetes.io/name: rabbitmq
    environment: staging
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/mincloud-org/infra.git
    targetRevision: develop
    path: workloads/rabbitmq/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 3
  ignoreDifferences:
  - group: ""
    kind: Secret
    jsonPointers:
    - /data
  - group: rabbitmq.com
    kind: RabbitmqCluster
    jsonPointers:
    - /spec/rabbitmq/envConfig
  info:
  - name: Description
    value: RabbitMQ cluster for staging environment
  - name: Documentation
    value: https://github.com/mincloud-org/infra/tree/main/workloads/rabbitmq